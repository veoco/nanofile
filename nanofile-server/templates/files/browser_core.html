<div class="file-list-container"
     data-drop-zone
     ondragover="onDragOver(event)" ondragenter="onDragEnter(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
    {% include "includes/file_list.html" %}

    <!-- Drop zone overlay (shown during drag-over) -->
    <div class="drop-overlay hidden absolute inset-0 z-40 flex items-center justify-center rounded-lg border-2 border-dashed border-seafile-blue bg-blue-50/90">
        <div class="text-center">
            <svg class="mx-auto h-12 w-12 text-seafile-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
            <p class="mt-3 text-lg font-medium text-gray-700">Drop files or folders here</p>
            <p class="mt-1 text-sm text-gray-500">They will be uploaded to the current directory</p>
        </div>
    </div>
</div>
