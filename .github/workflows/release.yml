name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.3)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: >-
    ${{
      github.event_name == 'workflow_dispatch'
      && format('v{0}', github.event.inputs.version)
      || github.ref_name
    }}

jobs:
  # ── Build on every platform ────────────────────────────────────────
  build:
    name: ${{ matrix.asset_suffix }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            asset_suffix: linux-amd64
            tw_name: linux-x64
            cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            ext: ""
            asset_suffix: linux-amd64-musl
            tw_name: linux-x64
            cross: true
          # Linux ARM64 / AArch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: ""
            asset_suffix: linux-arm64
            tw_name: linux-x64
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            ext: ""
            asset_suffix: linux-arm64-musl
            tw_name: linux-x64
            cross: true
          # Linux LoongArch64
          - os: ubuntu-latest
            target: loongarch64-unknown-linux-gnu
            ext: ""
            asset_suffix: linux-loong64
            tw_name: linux-x64
            cross: true
          - os: ubuntu-latest
            target: loongarch64-unknown-linux-musl
            ext: ""
            asset_suffix: linux-loong64-musl
            tw_name: linux-x64
            cross: true
          # macOS
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            asset_suffix: macos-arm64
            tw_name: macos-arm64
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            asset_suffix: windows-amd64
            tw_name: windows-x64.exe
            cross: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          # workflow_dispatch: tag doesn't exist yet, checkout the triggering commit
          # tag push: tag exists, checkout the tag
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || env.RELEASE_TAG }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zig (cross-compilation)
        if: matrix.cross
        run: |
          curl -sL --retry 3 --retry-delay 2 https://ziglang.org/download/0.14.0/zig-linux-x86_64-0.14.0.tar.xz \
            -o /tmp/zig.tar.xz
          tar xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-linux-x86_64-0.14.0" >> $GITHUB_PATH

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdav1d-dev pkg-config

      - name: Install Tailwind CSS
        run: npm install --silent tailwindcss @tailwindcss/cli

      - name: Install cargo-zigbuild
        if: matrix.cross
        run: cargo install cargo-zigbuild

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: >-
          ${{ matrix.cross && 'cargo zigbuild' || 'cargo build' }}
          --release
          ${{ matrix.cross && format('--target {0}', matrix.target) || '' }}

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: nanofile-${{ matrix.asset_suffix }}
          path: ${{ matrix.cross && format('target/{0}/release/nanofile{1}', matrix.target, matrix.ext) || format('target/release/nanofile{0}', matrix.ext) }}
          retention-days: 5

  # ── Docker image ──────────────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Download linux binaries
        uses: actions/download-artifact@v8
        with:
          pattern: nanofile-linux-*
          path: artifacts

      - name: Prepare binaries for multi-arch Docker build
        run: |
          mkdir -p docker-context
          platforms=""
          for dir in artifacts/nanofile-*; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            # Use musl binaries — they're statically linked, suitable for scratch
            case "$name" in
              *-musl)
                base="${name%-musl}"
                arch="${base##*-}"
                case "$arch" in
                  amd64)   docker_arch="amd64";   plat="linux/amd64" ;;
                  arm64)   docker_arch="arm64";   plat="linux/arm64" ;;
                  loong64) docker_arch="loong64"; plat="linux/loong64" ;;
                  *) continue ;;
                esac
                ;;
              *) continue ;;
            esac
            if [ -f "$dir/nanofile" ]; then
              chmod +x "$dir/nanofile"
              cp "$dir/nanofile" "docker-context/nanofile-linux-${docker_arch}"
              platforms="${platforms},${plat}"
            fi
          done
          platforms="${platforms#,}"
          echo "DOCKER_PLATFORMS=$platforms" >> $GITHUB_ENV
          echo "Platforms: $platforms"
          ls -la docker-context/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: docker-context
          file: Dockerfile.ci
          platforms: ${{ env.DOCKER_PLATFORMS }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: |
            org.opencontainers.image.description=nanofile - A Rust-based Seafile-compatible server
          push: true

  # ── Single release job ─────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Package archives from binaries
        run: |
          mkdir release-assets
          for dir in artifacts/nanofile-*; do
            [ -d "$dir" ] || continue
            suffix="$(basename "$dir")"
            suffix="${suffix#nanofile-}"

            # Detect platform and set binary name / archive format
            if [ -f "$dir/nanofile.exe" ]; then
              bin="nanofile.exe"
              ext=".zip"
            else
              bin="nanofile"
              ext=".tar.gz"
            fi

            archive_dir="nanofile-${RELEASE_TAG}-${suffix}"
            mkdir -p "${archive_dir}"
            cp "$dir/$bin" "${archive_dir}/$bin"
            cp README.md "${archive_dir}/" 2>/dev/null || true
            cp LICENSE "${archive_dir}/" 2>/dev/null || true
            cp config.toml "${archive_dir}/" 2>/dev/null || true

            if [ "$ext" = ".zip" ]; then
              (cd "${archive_dir}" && 7z a "../release-assets/${archive_dir}.zip" ./* >/dev/null)
            else
              tar czf "release-assets/${archive_dir}${ext}" "${archive_dir}/"
            fi
            rm -rf "${archive_dir}"
          done
          ls -la release-assets/

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # ── Generate changelog from git log ─────────────────────────
          TAG_COUNT=$(git tag --list 'v*' --sort=-v:refname | wc -l)
          if [ "$TAG_COUNT" -gt 1 ]; then
            PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | head -2 | tail -1)
            CHANGELOG="$(git log --oneline --no-decorate "$PREV_TAG"..HEAD \
              | sed 's/^/* /')"
            COMPARE_LINK="https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${RELEASE_TAG}"
          else
            CHANGELOG="$(git log --oneline --no-decorate HEAD \
              | sed 's/^/* /')"
            COMPARE_LINK="https://github.com/${GITHUB_REPOSITORY}/commits/${RELEASE_TAG}"
          fi

          # ── Write release notes ──────────────────────────────────────
          cat > release-notes.md <<-EOF
          ## nanofile $RELEASE_TAG

          A Rust-based Seafile-compatible server.

          ### Changelog

          $CHANGELOG

          **[Full Changelog]($COMPARE_LINK)**

          ### Downloads

          | Platform | Archive |
          |---|---|
          | Linux (amd64, glibc) | \`nanofile-$RELEASE_TAG-linux-amd64.tar.gz\` |
          | Linux (amd64, musl) | \`nanofile-$RELEASE_TAG-linux-amd64-musl.tar.gz\` |
          | Linux (arm64, glibc) | \`nanofile-$RELEASE_TAG-linux-arm64.tar.gz\` |
          | Linux (arm64, musl) | \`nanofile-$RELEASE_TAG-linux-arm64-musl.tar.gz\` |
          | Linux (LoongArch64, glibc) | \`nanofile-$RELEASE_TAG-linux-loong64.tar.gz\` |
          | Linux (LoongArch64, musl) | \`nanofile-$RELEASE_TAG-linux-loong64-musl.tar.gz\` |
          | macOS (Apple Silicon) | \`nanofile-$RELEASE_TAG-macos-arm64.tar.gz\` |
          | Windows (amd64) | \`nanofile-$RELEASE_TAG-windows-amd64.zip\` |
          EOF

          gh release create "$RELEASE_TAG" \
            --title "nanofile $RELEASE_TAG" \
            --notes-file release-notes.md \
            release-assets/*
