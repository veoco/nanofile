name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Formatting ──────────────────────────────────────────────────────
  fmt:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # ── Linting ─────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Tailwind CSS
        run: npm install --silent tailwindcss @tailwindcss/cli
      - run: cargo clippy -- -D warnings

  # ── Tests (linux only, fastest) ─────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Tailwind CSS
        run: npm install --silent tailwindcss @tailwindcss/cli

      - name: Run tests
        run: cargo test -- --nocapture

  # ── Cross-platform release build ────────────────────────────────────
  build:
    name: ${{ matrix.asset_suffix }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            asset_suffix: linux-amd64
            tw_name: linux-x64
            cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            ext: ""
            asset_suffix: linux-amd64-musl
            tw_name: linux-x64
            cross: true
          # Linux ARM64 / AArch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: ""
            asset_suffix: linux-arm64
            tw_name: linux-x64
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            ext: ""
            asset_suffix: linux-arm64-musl
            tw_name: linux-x64
            cross: true
          # Linux LoongArch64
          - os: ubuntu-latest
            target: loongarch64-unknown-linux-gnu
            ext: ""
            asset_suffix: linux-loong64
            tw_name: linux-x64
            cross: true
          - os: ubuntu-latest
            target: loongarch64-unknown-linux-musl
            ext: ""
            asset_suffix: linux-loong64-musl
            tw_name: linux-x64
            cross: true
          # macOS
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            asset_suffix: macos-arm64
            tw_name: macos-arm64
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            asset_suffix: windows-amd64
            tw_name: windows-x64.exe
            cross: false

    runs-on: ${{ matrix.os }}
    needs: [fmt, clippy]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zig (cross-compilation)
        if: matrix.cross
        run: |
          curl -sL --retry 3 --retry-delay 2 https://ziglang.org/download/0.14.0/zig-linux-x86_64-0.14.0.tar.xz \
            -o /tmp/zig.tar.xz
          tar xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-linux-x86_64-0.14.0" >> $GITHUB_PATH

      - name: Install Tailwind CSS
        run: npm install --silent tailwindcss @tailwindcss/cli

      - name: Install cargo-zigbuild
        if: matrix.cross
        run: cargo install cargo-zigbuild

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: >-
          ${{ matrix.cross && 'cargo zigbuild' || 'cargo build' }}
          --release
          ${{ matrix.cross && format('--target {0}', matrix.target) || '' }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: nanofile-${{ github.sha }}-${{ matrix.asset_suffix }}
          path: ${{ matrix.cross && format('target/{0}/release/nanofile{1}', matrix.target, matrix.ext) || format('target/release/nanofile{0}', matrix.ext) }}
          retention-days: 7

  # ── Dev Docker image (multi-arch from pre-built binaries) ─────────
  docker-dev:
    name: Docker (dev)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref_name == 'main' && !cancelled()
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Download linux binaries
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: nanofile-${{ github.sha }}-linux-*
          path: artifacts

      - name: Prepare binaries for multi-arch Docker build
        run: |
          mkdir -p docker-context
          platforms=""
          for dir in artifacts/nanofile-*; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            # Use musl binaries — they're statically linked, suitable for scratch
            case "$name" in
              *-musl)
                base="${name%-musl}"
                arch="${base##*-}"
                case "$arch" in
                  amd64)   docker_arch="amd64";   plat="linux/amd64" ;;
                  arm64)   docker_arch="arm64";   plat="linux/arm64" ;;
                  loong64) docker_arch="loong64"; plat="linux/loong64" ;;
                  *) continue ;;
                esac
                ;;
              *) continue ;;
            esac
            # Find the binary — raw (CI) or inside archive (Release)
            if [ ! -f "$dir/nanofile" ]; then
              archive=$(ls "$dir"/*.tar.gz 2>/dev/null | head -1)
              [ -n "$archive" ] && tar xzf "$archive" --strip-components=1 -C "$dir/"
            fi
            if [ -f "$dir/nanofile" ]; then
              chmod +x "$dir/nanofile"
              cp "$dir/nanofile" "docker-context/nanofile-linux-${docker_arch}"
              platforms="${platforms},${plat}"
            fi
          done
          platforms="${platforms#,}"
          echo "DOCKER_PLATFORMS=$platforms" >> $GITHUB_ENV
          echo "Platforms: $platforms"
          ls -la docker-context/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev Docker image
        uses: docker/build-push-action@v7
        with:
          context: docker-context
          file: Dockerfile.ci
          platforms: ${{ env.DOCKER_PLATFORMS }}
          tags: |
            ghcr.io/${{ github.repository }}:edge
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          push: true
