<nav class="flex mb-4 text-sm text-gray-500 flex-wrap items-center">
    <a href="/libraries/" class="hover:text-seafile-blue flex-shrink-0">Libraries</a>
    <span class="mx-2 flex-shrink-0">/</span>
    <a href="/library/{{ repo_id }}/{{ repo_name }}/" class="hover:text-seafile-blue flex-shrink-0">{{ repo_name }}</a>
    {% for crumb in breadcrumbs %}
    <span class="mx-2 flex-shrink-0">/</span>
    {% if loop.last %}
    <span class="text-gray-900 font-medium truncate max-w-[200px] sm:max-w-xs">{{ crumb.label }}</span>
    {% else %}
    <a href="/library/{{ repo_id }}/{{ repo_name }}/{{ crumb.path }}" class="hover:text-seafile-blue truncate max-w-[120px] sm:max-w-[200px]">{{ crumb.label }}</a>
    {% endif %}
    {% endfor %}
</nav>
