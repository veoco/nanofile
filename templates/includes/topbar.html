<header class="sticky top-0 z-40 flex h-16 items-center gap-x-4 border-b border-gray-200 bg-white px-4 shadow-sm dark:border-gray-700 dark:bg-gray-900 lg:border-none lg:shadow-none lg:px-6">
    <!-- Mobile menu button -->
    <button type="button" class="js-mobile-menu-toggle -mx-2 rounded-md p-2 text-gray-400 hover:bg-gray-100 hover:text-gray-500 lg:hidden dark:hover:bg-gray-800">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
    </button>

    <div class="flex flex-1"></div>

    <!-- User menu -->
    <div class="relative js-user-menu">
        <button type="button" class="js-user-menu-button flex items-center gap-x-2 rounded-full bg-white text-sm font-semibold text-gray-900 dark:bg-gray-800 dark:text-white">
            <span class="flex h-8 w-8 items-center justify-center rounded-full bg-seafile-blue text-white text-xs font-bold">
                {{ user_email.chars().next().unwrap_or('?') }}
            </span>
            <span class="hidden lg:block">{{ user_email }}</span>
            {% if is_admin %}
            <span class="ml-2 inline-flex items-center rounded-full bg-yellow-100 px-2.5 py-0.5 text-xs font-semibold text-yellow-800 ring-1 ring-inset ring-yellow-600/20">
                Admin
            </span>
            {% endif %}
        </button>
    </div>
</header>
