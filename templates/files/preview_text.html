{% extends "base.html" %}

{% block title %}{{ file_name }} | Nanofile{% endblock %}

{% block content %}
<nav class="flex mb-4 text-sm text-gray-500 flex-wrap items-center">
    <a href="/libraries/" class="hover:text-seafile-blue flex-shrink-0">Libraries</a>
    <span class="mx-2 flex-shrink-0">/</span>
    <a href="/library/{{ repo_id }}/{{ repo_name }}/" class="hover:text-seafile-blue flex-shrink-0">{{ repo_name }}</a>
    {% if parent_path != "" %}
    <span class="mx-2 flex-shrink-0">/</span>
    <a href="/library/{{ repo_id }}/{{ repo_name }}/{{ parent_path }}" class="hover:text-seafile-blue flex-shrink-0">..</a>
    {% endif %}
    <span class="mx-2 flex-shrink-0">/</span>
    <span class="text-gray-900 font-medium truncate max-w-[200px]">{{ file_name }}</span>
</nav>

<div class="rounded-lg border border-gray-200 bg-white shadow-sm overflow-hidden">
    <div class="border-b border-gray-200 bg-gray-50 px-4 py-2 text-sm font-medium text-gray-700 flex items-center justify-between">
        <span>{{ file_name }}</span>
        <a href="/library/{{ repo_id }}/{{ repo_name }}/{{ parent_path }}" class="text-xs text-seafile-blue hover:underline">&larr; Back to folder</a>
    </div>
    <pre class="overflow-x-auto p-4 text-sm"><code>{{ content }}</code></pre>
</div>
{% endblock %}
