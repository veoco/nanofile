<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Nanofile</title>
    <meta name="description" content="Nanofile - Seafile-compatible sync server">
    <link rel="icon" type="image/svg+xml" href="{{ urls.favicon }}">
    <link rel="stylesheet" href="{{ urls.css }}">
</head>
<body class="h-full">
<div class="flex min-h-full items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8">
        <div>
            <h1 class="text-center text-3xl font-bold tracking-tight text-gray-900">
                Create Account
            </h1>
            <p class="mt-2 text-center text-sm text-gray-600">
                Enter your details and invitation code to get started.
            </p>
        </div>

        {% if let Some(error) = error %}
        {% include "includes/alert_error.html" %}
        {% endif %}

        <form class="mt-8 space-y-6" action="/accounts/register/" method="POST">
            <div class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
                    <input id="email"
                           name="email"
                           type="email"
                           autocomplete="email"
                           required
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-seafile-blue focus:ring-seafile-blue sm:text-sm border p-2">
                </div>
                <div>
                    <label for="password1" class="block text-sm font-medium text-gray-700">Password</label>
                    <input id="password1"
                           name="password1"
                           type="password"
                           autocomplete="new-password"
                           required
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-seafile-blue focus:ring-seafile-blue sm:text-sm border p-2">
                    <p class="mt-1 text-xs text-gray-500">At least 8 characters.</p>
                </div>
                <div>
                    <label for="password2" class="block text-sm font-medium text-gray-700">Confirm Password</label>
                    <input id="password2"
                           name="password2"
                           type="password"
                           autocomplete="new-password"
                           required
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-seafile-blue focus:ring-seafile-blue sm:text-sm border p-2">
                </div>
                <div>
                    <label for="invitation_code" class="block text-sm font-medium text-gray-700">Invitation Code</label>
                    <input id="invitation_code"
                           name="invitation_code"
                           type="text"
                           required
                           placeholder="Enter the invitation code you received"
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-seafile-blue focus:ring-seafile-blue sm:text-sm border p-2">
                </div>
            </div>

            <div>
                <button type="submit"
                        class="group relative flex w-full justify-center rounded-md bg-seafile-blue py-2 px-3 text-sm font-semibold text-white hover:bg-blue-600 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-seafile-blue">
                    Create Account
                </button>
            </div>
        </form>

        <p class="mt-4 text-center text-sm text-gray-500">
            Already have an account?
            <a href="/accounts/login/" class="text-seafile-blue hover:text-blue-700">Sign in</a>
        </p>
    </div>
</div>
</body>
</html>
