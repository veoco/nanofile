<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Nanofile</title>
    <meta name="description" content="Nanofile - Seafile-compatible sync server">
    <link rel="icon" type="image/svg+xml" href="{{ urls.favicon }}">
    <link rel="stylesheet" href="{{ urls.css }}">
</head>
<body class="h-full">
<div class="flex min-h-full items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8">
        <div>
            <h1 class="text-center text-3xl font-bold tracking-tight text-gray-900">
                Reset Password
            </h1>
            <p class="mt-2 text-center text-sm text-gray-600">
                Enter your email address to receive a password reset link.
            </p>
        </div>

        {% if let Some(error) = error %}
        {% include "includes/alert_error.html" %}
        {% endif %}

        <form class="mt-8 space-y-6" action="/accounts/password/reset/" method="POST">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
                <input id="email"
                       name="email"
                       type="email"
                       autocomplete="email"
                       required
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-seafile-blue focus:ring-seafile-blue sm:text-sm border p-2">
            </div>

            <div>
                <button type="submit"
                        class="group relative flex w-full justify-center rounded-md bg-seafile-blue py-2 px-3 text-sm font-semibold text-white hover:bg-blue-600 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-seafile-blue">
                    Send Reset Link
                </button>
            </div>
        </form>

        <p class="mt-4 text-center text-sm text-gray-500">
            <a href="/accounts/login/" class="text-seafile-blue hover:text-blue-700">
                &larr; Back to login
            </a>
        </p>
    </div>
</div>
</body>
</html>
