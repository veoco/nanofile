<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete | Nanofile</title>
    <meta name="description" content="Nanofile - Seafile-compatible sync server">
    <link rel="icon" type="image/svg+xml" href="{{ urls.favicon }}">
    <link rel="stylesheet" href="{{ urls.css }}">
</head>
<body class="h-full">
<div class="flex min-h-full items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8">
        <div>
            <h1 class="text-center text-3xl font-bold tracking-tight text-gray-900">
                Password Reset Complete
            </h1>
        </div>

        <div class="border-l-4 border-green-500 bg-green-50 rounded-md p-4">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-5 w-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <div class="ml-3">
                    <p class="text-sm text-green-700">
                        Your password has been reset successfully.
                        Sign in with your new password.
                    </p>
                </div>
            </div>
        </div>

        <p class="mt-4 text-center text-sm text-gray-500">
            <a href="/accounts/login/" class="rounded-md bg-seafile-blue py-2 px-4 text-sm font-semibold text-white hover:bg-blue-600 inline-block">
                Sign In
            </a>
        </p>
    </div>
</div>
</body>
</html>
