<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | Nanofile</title>
    <meta name="description" content="Nanofile - Seafile-compatible sync server">
    <link rel="icon" type="image/svg+xml" href="{{ urls.favicon }}">
    <link rel="stylesheet" href="{{ urls.css }}">
</head>
<body class="h-full">
<div class="flex min-h-full items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8">
        <div>
            <h1 class="text-center text-3xl font-bold tracking-tight text-gray-900">
                Set New Password
            </h1>
        </div>

        {% if let Some(error) = error %}
        {% include "includes/alert_error.html" %}
        {% endif %}

        {% if valid %}
        <form class="mt-8 space-y-6" action="" method="POST">
            <div class="space-y-4">
                <div>
                    <label for="password1" class="block text-sm font-medium text-gray-700">New Password</label>
                    <input id="password1"
                           name="password1"
                           type="password"
                           autocomplete="new-password"
                           required
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-seafile-blue focus:ring-seafile-blue sm:text-sm border p-2">
                    <p class="mt-1 text-xs text-gray-500">At least 8 characters.</p>
                </div>
                <div>
                    <label for="password2" class="block text-sm font-medium text-gray-700">Confirm New Password</label>
                    <input id="password2"
                           name="password2"
                           type="password"
                           autocomplete="new-password"
                           required
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-seafile-blue focus:ring-seafile-blue sm:text-sm border p-2">
                </div>
            </div>

            <div>
                <button type="submit"
                        class="group relative flex w-full justify-center rounded-md bg-seafile-blue py-2 px-3 text-sm font-semibold text-white hover:bg-blue-600 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-seafile-blue">
                    Reset Password
                </button>
            </div>
        </form>
        {% else %}
        <div class="border-l-4 border-red-500 bg-red-50 rounded-md p-4">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-5 w-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                    </svg>
                </div>
                <div class="ml-3">
                    <p class="text-sm text-red-700">
                        This reset link is invalid or has expired.
                        Please request a new password reset.
                    </p>
                </div>
            </div>
        </div>

        <p class="mt-4 text-center text-sm text-gray-500">
            <a href="/accounts/password/reset/" class="text-seafile-blue hover:text-blue-700">
                Request new reset link
            </a>
        </p>
        {% endif %}

        <p class="mt-4 text-center text-sm text-gray-500">
            <a href="/accounts/login/" class="text-seafile-blue hover:text-blue-700">
                &larr; Back to login
            </a>
        </p>
    </div>
</div>
</body>
</html>
