<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Factor Authentication | Nanofile</title>
    <meta name="description" content="Nanofile - Seafile-compatible sync server">
    <link rel="icon" type="image/svg+xml" href="{{ urls.favicon }}">
    <link rel="stylesheet" href="{{ urls.css }}">
</head>
<body class="h-full">
<div class="flex min-h-full items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8">
        <div>
            <h1 class="text-center text-3xl font-bold tracking-tight text-gray-900">
                Nanofile
            </h1>
            <p class="mt-2 text-center text-sm text-gray-600">
                Two-Factor Authentication Required
            </p>
        </div>

        {% if let Some(error) = error %}
        {% include "includes/alert_error.html" %}
        {% endif %}

        <div class="border-l-4 border-blue-500 bg-blue-50 rounded-md p-4">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-5 w-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <div class="ml-3">
                    <p class="text-sm text-blue-700">
                        Enter the verification code from your authenticator app,
                        or use one of your backup codes.
                    </p>
                </div>
            </div>
        </div>

        <form class="mt-8 space-y-6" action="/accounts/two-factor-auth/" method="POST">
            <div class="rounded-md shadow-sm">
                <div>
                    <label for="code" class="sr-only">Verification Code</label>
                    <input id="code"
                           name="code"
                           type="text"
                           inputmode="numeric"
                           autocomplete="one-time-code"
                           required
                           placeholder="Verification code"
                           class="relative block w-full rounded-md border-0 py-1.5 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:z-10 focus:ring-2 focus:ring-inset focus:ring-seafile-blue sm:text-sm sm:leading-6">
                </div>
            </div>

            <div>
                <button type="submit"
                        class="group relative flex w-full justify-center rounded-md bg-seafile-blue py-2 px-3 text-sm font-semibold text-white hover:bg-blue-600 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-seafile-blue">
                    Verify
                </button>
            </div>
        </form>

        <p class="mt-4 text-center text-xs text-gray-500">
            <a href="/accounts/login/" class="text-seafile-blue hover:text-blue-700">
                &larr; Back to login
            </a>
        </p>
    </div>
</div>
</body>
</html>
