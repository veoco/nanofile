<header class="sticky top-0 z-40 flex h-16 items-center gap-x-3 border-b border-gray-200 bg-white/80 backdrop-blur-sm dark:bg-surface-800/80 dark:border-gray-700 px-4">
    <!-- Mobile menu button + Logo (left side) -->
    <div class="flex items-center gap-2 flex-shrink-0">
        <button type="button" class="js-mobile-menu-toggle -mx-2 rounded-md p-2 text-gray-400 hover:bg-gray-100 hover:text-gray-500 lg:hidden dark:hover:bg-surface-700"
                aria-label="Toggle sidebar">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
        <a href="/libraries/" class="flex items-center gap-2 text-lg font-bold text-gray-900 dark:text-white tracking-tight">
            <span class="h-8 w-8 rounded-lg bg-brand-500 flex items-center justify-center text-white text-sm font-bold">N</span>
            <span class="hidden sm:inline">Nanofile</span>
        </a>
    </div>

    <!-- Search bar (flex-1, stays center-ish) -->
    <div class="flex-1 max-w-md mx-2 lg:mx-6">
        <div class="relative w-full">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="search" placeholder="Search files..."
                   class="js-quick-search w-full rounded-lg border-0 bg-gray-100 dark:bg-surface-700 pl-9 pr-8 py-2 text-sm text-gray-900 dark:text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500"
                   aria-label="Search files">
            <kbd class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-400 bg-gray-200 dark:bg-surface-600 rounded px-1.5 py-0.5 font-sans hidden sm:inline">/</kbd>
        </div>
    </div>

    <!-- Right-aligned actions -->
    <div class="flex items-center gap-1 ml-auto">
        <!-- Settings -->
        <a href="/profile/"
           class="rounded-md p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 dark:hover:bg-surface-700 dark:hover:text-gray-300 transition-colors"
           title="Settings" aria-label="Settings">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
        </a>

        <!-- Dark mode toggle -->
        <button type="button" class="js-dark-toggle rounded-md p-2 text-gray-400 hover:bg-gray-100 hover:text-gray-500 dark:hover:bg-surface-700 dark:hover:text-gray-300 transition-colors"
                aria-label="Toggle dark mode">
            <svg class="h-5 w-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
            <svg class="h-5 w-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
        </button>

        <!-- User menu dropdown -->
        <div class="relative js-user-menu">
            <button type="button" class="js-user-menu-button flex items-center gap-x-2 rounded-full p-1 text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-surface-700 transition-colors">
                <img src="/avatars/user/{{ user_email }}/resized/32/" alt=""
                     class="h-7 w-7 rounded-full object-cover bg-brand-500">
                <span class="hidden lg:block">{{ user_email }}</span>
                {% if is_admin %}
                <span class="ml-1 inline-flex items-center rounded-full bg-brand-50 px-2 py-0.5 text-xs font-medium text-brand-700 ring-1 ring-inset ring-brand-600/20 dark:bg-brand-500/10 dark:text-brand-300 dark:ring-brand-400/20">Admin</span>
                {% endif %}
            </button>
        </div>
    </div>
</header>
