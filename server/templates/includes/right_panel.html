<!-- Right Panel — File Details -->
<div class="flex flex-col h-full">
    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200 dark:border-gray-700">
        <h3 class="text-sm font-semibold text-gray-900 dark:text-gray-100">Details</h3>
    </div>

    <!-- Placeholder — shown when no item is selected -->
    <div class="js-rp-placeholder flex-1 flex items-center justify-center p-4">
        <div class="text-center">
            <svg class="mx-auto h-10 w-10 text-gray-300 dark:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20 10 10 0 000-20z"/>
            </svg>
            <p class="mt-2 text-xs text-gray-400 dark:text-gray-500">Select an item</p>
        </div>
    </div>

    <!-- Content — shown when an item is selected -->
    <div class="js-rp-content hidden flex-1 flex flex-col">
        <!-- Scrollable info area -->
        <div class="flex-1 overflow-y-auto">
            <!-- Preview -->
            <div class="js-rp-preview flex items-center justify-center py-6 px-4 bg-gray-50/50 dark:bg-surface-800/50">
                <div class="w-24 h-24 rounded-xl flex items-center justify-center overflow-hidden bg-gray-100 dark:bg-surface-700">
                    <img class="js-rp-thumb-img hidden w-full h-full object-contain" src="" alt="">
                    <span class="js-rp-ext-badge hidden text-2xl font-bold"></span>
                    <svg class="js-rp-folder-icon hidden h-14 w-14 text-amber-400" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M2 6a2 2 0 012-2h5l2 2h9a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
                    </svg>
                    <svg class="js-rp-video-icon hidden h-10 w-10 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </div>
            </div>

            <!-- Basic Info -->
            <div class="px-4 py-3 space-y-2.5">
                <!-- Name -->
                <div>
                    <p class="js-rp-name text-sm font-semibold text-gray-900 dark:text-gray-100 break-words leading-snug"></p>
                </div>
                <!-- Type -->
                <div class="flex items-center justify-between">
                    <span class="text-xs text-gray-500 dark:text-gray-400">Type</span>
                    <span class="js-rp-type text-xs font-medium text-gray-900 dark:text-gray-100 text-right"></span>
                </div>
                <!-- Size (file only) -->
                <div class="js-rp-size-row flex items-center justify-between">
                    <span class="text-xs text-gray-500 dark:text-gray-400">Size</span>
                    <span class="js-rp-size text-xs font-medium text-gray-900 dark:text-gray-100 text-right"></span>
                </div>
                <!-- Modified -->
                <div class="flex items-center justify-between">
                    <span class="text-xs text-gray-500 dark:text-gray-400">Modified</span>
                    <span class="js-rp-mtime text-xs font-medium text-gray-900 dark:text-gray-100 text-right"></span>
                </div>
                <!-- Path -->
                <div class="flex items-start justify-between gap-2">
                    <span class="text-xs text-gray-500 dark:text-gray-400 flex-shrink-0">Path</span>
                    <span class="js-rp-path text-xs font-medium text-gray-900 dark:text-gray-100 text-right break-all leading-snug"></span>
                </div>
                <!-- Extension (file only) -->
                <div class="js-rp-extension-row flex items-center justify-between">
                    <span class="text-xs text-gray-500 dark:text-gray-400">Extension</span>
                    <span class="js-rp-extension text-xs font-medium text-gray-900 dark:text-gray-100 text-right"></span>
                </div>
                <!-- Starred -->
                <div class="flex items-center justify-between">
                    <span class="text-xs text-gray-500 dark:text-gray-400">Starred</span>
                    <button class="js-rp-starred inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs font-medium transition-colors"
                            data-starred="false">
                        <svg class="js-rp-star-icon h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
                        </svg>
                        <span class="js-rp-star-label">Unstar</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Share Links (fetched from API for the selected file) -->
        <div class="js-rp-share-links-section hidden px-4 py-3 border-t border-gray-100 dark:border-gray-700/50">
            <h4 class="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2 flex items-center gap-1">
                <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                </svg>
                Share Links
            </h4>
            <div class="js-rp-share-links-list space-y-1 max-h-32 overflow-y-auto">
                <!-- Populated by JS -->
            </div>
            <div class="js-rp-no-share-links hidden text-xs text-gray-400 dark:text-gray-500">No share links</div>
        </div>

        <!-- Upload Links (fetched from API for the selected dir) -->
        <div class="js-rp-upload-links-section hidden px-4 py-3 border-t border-gray-100 dark:border-gray-700/50">
            <h4 class="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2 flex items-center gap-1">
                <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                </svg>
                Upload Links
            </h4>
            <div class="js-rp-upload-links-list space-y-1 max-h-32 overflow-y-auto">
                <!-- Populated by JS -->
            </div>
            <div class="js-rp-no-upload-links hidden text-xs text-gray-400 dark:text-gray-500">No upload links</div>
        </div>

        <!-- Actions — sticky at bottom -->
        <div class="flex-shrink-0 border-t border-gray-100 dark:border-gray-700/50 px-4 py-3 space-y-2">
            <div class="js-rp-download-row">
                <a class="js-rp-download inline-flex items-center gap-1.5 w-full justify-center rounded-lg bg-brand-500 px-3 py-2 text-xs font-medium text-white hover:bg-brand-600 transition-colors"
                   href="" target="_blank">
                    <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    Download
                </a>
            </div>
            <button type="button" class="js-rp-share js-share-btn inline-flex items-center gap-1.5 w-full justify-center rounded-lg border border-brand-200 dark:border-brand-900/50 px-3 py-2 text-xs font-medium text-brand-600 dark:text-brand-400 hover:bg-brand-50 dark:hover:bg-brand-900/20 transition-colors">
                <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                </svg>
                Get Share Link
            </button>
            <button type="button" id="rp-upload-link-btn" style="display:none" class="inline-flex items-center gap-1.5 w-full justify-center rounded-lg border border-emerald-200 dark:border-emerald-900/50 px-3 py-2 text-xs font-medium text-emerald-600 dark:text-emerald-400 hover:bg-emerald-50 dark:hover:bg-emerald-900/20 transition-colors">
                <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                </svg>
                Get Upload Link
            </button>
            <div class="flex gap-2">
                <button class="js-rp-delete-btn js-delete-btn flex-1 inline-flex items-center justify-center gap-1.5 rounded-lg border border-red-200 dark:border-red-900/50 px-3 py-2 text-xs font-medium text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                    <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                    Delete
                </button>
            </div>
        </div>
    </div>

    <!-- Multi-select summary — shown when multiple items are selected -->
    <div class="js-rp-multi-content hidden flex-1 flex flex-col">
        <div class="flex-1 overflow-y-auto px-4 py-3">
            <p class="js-rp-multi-count text-sm font-semibold text-gray-900 dark:text-gray-100 mb-3"></p>
            <div class="js-rp-multi-list space-y-1">
                <!-- Populated by JS with file/folder names -->
            </div>
        </div>
        <div class="flex-shrink-0 border-t border-gray-100 dark:border-gray-700/50 px-4 py-3 space-y-2">
            <button type="button" class="js-batch-download inline-flex items-center gap-1.5 w-full justify-center rounded-lg bg-brand-500 px-3 py-2 text-xs font-medium text-white hover:bg-brand-600 transition-colors">
                <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                Download Selected
            </button>
            <button type="button" class="js-batch-delete inline-flex items-center gap-1.5 w-full justify-center rounded-lg border border-red-200 dark:border-red-900/50 px-3 py-2 text-xs font-medium text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
                Delete Selected
            </button>
        </div>
    </div>
</div>
