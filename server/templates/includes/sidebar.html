<aside class="js-sidebar fixed inset-y-0 left-0 z-50 hidden flex-col bg-surface-900 lg:flex transition-all duration-300"
       style="width: var(--sidebar-width, 16rem)">
    <div class="flex h-16 items-center justify-center border-b border-gray-700/50">
        <a href="/libraries/" class="js-sidebar-logo text-xl font-bold text-white tracking-tight">Nanofile</a>
        <a href="/libraries/" class="js-sidebar-logo-sm hidden text-xl font-bold text-white tracking-tight">N</a>
    </div>
    <nav class="flex-1 space-y-1 px-3 py-4 overflow-y-auto" role="navigation" aria-label="Sidebar navigation">
        <a href="/libraries/"
           class="flex items-center rounded-lg px-3 py-2.5 text-sm font-medium transition-colors
           {% if active_page == "repos" %}bg-brand-600/20 text-brand-300{% else %}text-gray-300 hover:bg-gray-700/50 hover:text-white{% endif %}">
            <svg class="mr-3 h-5 w-5 flex-shrink-0 sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
            </svg>
            <span class="js-sidebar-label">Libraries</span>
        </a>

        <a href="/share/"
           class="flex items-center rounded-lg px-3 py-2.5 text-sm font-medium transition-colors
           {% if active_page == "shares" %}bg-brand-600/20 text-brand-300{% else %}text-gray-300 hover:bg-gray-700/50 hover:text-white{% endif %}">
            <svg class="mr-3 h-5 w-5 flex-shrink-0 sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
            </svg>
            <span class="js-sidebar-label">Shares</span>
        </a>

        <a href="/search"
           class="flex items-center rounded-lg px-3 py-2.5 text-sm font-medium transition-colors
           {% if active_page == "search" %}bg-brand-600/20 text-brand-300{% else %}text-gray-300 hover:bg-gray-700/50 hover:text-white{% endif %}">
            <svg class="mr-3 h-5 w-5 flex-shrink-0 sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <span class="js-sidebar-label">Search</span>
        </a>

        <a href="/starred/"
           class="flex items-center rounded-lg px-3 py-2.5 text-sm font-medium transition-colors
           {% if active_page == "starred" %}bg-brand-600/20 text-brand-300{% else %}text-gray-300 hover:bg-gray-700/50 hover:text-white{% endif %}">
            <svg class="mr-3 h-5 w-5 flex-shrink-0 sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
            </svg>
            <span class="js-sidebar-label">Starred</span>
        </a>

        <a href="/trash/"
           class="flex items-center rounded-lg px-3 py-2.5 text-sm font-medium transition-colors
           {% if active_page == "trash" %}bg-brand-600/20 text-brand-300{% else %}text-gray-300 hover:bg-gray-700/50 hover:text-white{% endif %}">
            <svg class="mr-3 h-5 w-5 flex-shrink-0 sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
            <span class="js-sidebar-label">Trash</span>
        </a>

        <a href="/activities/"
           class="flex items-center rounded-lg px-3 py-2.5 text-sm font-medium transition-colors
           {% if active_page == "activities" %}bg-brand-600/20 text-brand-300{% else %}text-gray-300 hover:bg-gray-700/50 hover:text-white{% endif %}">
            <svg class="mr-3 h-5 w-5 flex-shrink-0 sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span class="js-sidebar-label">Activities</span>
        </a>

        <a href="/profile/"
           class="flex items-center rounded-lg px-3 py-2.5 text-sm font-medium transition-colors
           {% if active_page == "settings" %}bg-brand-600/20 text-brand-300{% else %}text-gray-300 hover:bg-gray-700/50 hover:text-white{% endif %}">
            <svg class="mr-3 h-5 w-5 flex-shrink-0 sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            <span class="js-sidebar-label">Settings</span>
        </a>
    </nav>
    <div class="flex items-center justify-between border-t border-gray-700/50 p-3">
        <p class="js-sidebar-label text-xs text-gray-500 px-1">Nanofile v{{ urls.version }}</p>
        <button type="button" class="js-sidebar-collapse rounded-lg p-1.5 text-gray-400 hover:bg-gray-700/50 hover:text-gray-200 transition-colors"
                aria-label="Collapse sidebar" title="Collapse sidebar">
            <svg class="h-4 w-4 sidebar-collapse-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
            </svg>
        </button>
    </div>
</aside>

<!-- Mobile overlay -->
<div class="js-sidebar-overlay fixed inset-0 z-40 hidden bg-black/50 lg:hidden"></div>
