<!-- Left Panel — Library Tree & Quick Access (loaded dynamically) -->
<div class="flex flex-col h-full">
    <!-- Header -->
    <div class="flex items-center justify-between px-3 py-3 border-b border-gray-200 dark:border-gray-700">
        <h2 class="text-sm font-semibold text-gray-900 dark:text-gray-100">Libraries</h2>
    </div>

    <!-- Repo filter -->
    <div class="px-3 pt-2">
        <div class="relative">
            <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 h-3.5 w-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="text" class="js-repo-filter w-full rounded-md border-0 bg-gray-100 dark:bg-surface-700 pl-8 pr-2 py-1.5 text-xs text-gray-900 dark:text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-brand-500"
                   placeholder="Filter repos...">
        </div>
    </div>

    <!-- Repository tree list (server-rendered) -->
    <div class="flex-1 overflow-y-auto px-3 py-2 space-y-0.5 js-repo-tree">
        {% if left_panel_repos.is_empty() %}
        <p class="text-xs text-gray-400 dark:text-gray-500 text-center py-4">No libraries yet.</p>
        {% else %}
        {% for r in left_panel_repos %}
        <div class="js-repo-item" data-repo-id="{{ r.id }}">
            <a href="/library/{{ r.id }}/{{ r.name }}/"
               class="flex items-center gap-2 px-2 py-1.5 rounded-md text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-surface-700 transition-colors{% if current_repo_id.as_deref() == Some(r.id) %} bg-brand-50 dark:bg-brand-500/10 text-brand-600 dark:text-brand-400 font-medium{% endif %}">
                <svg class="h-4 w-4 flex-shrink-0 text-amber-400" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M2 6a2 2 0 012-2h5l2 2h9a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
                </svg>
                <span class="truncate flex-1">{{ r.name }}</span>
                <span class="text-xs text-gray-400">{{ r.size_display }}</span>
            </a>
        </div>
        {% endfor %}
        {% endif %}
    </div>

    <!-- Quick access links -->
    <div class="border-t border-gray-200 dark:border-gray-700 pt-2 pb-2 px-3 space-y-0.5">
        <a href="/starred/"
           class="flex items-center gap-2 px-2 py-1.5 rounded-md text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-surface-700 hover:text-gray-900 dark:hover:text-gray-100 transition-colors">
            <svg class="h-4 w-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
            </svg>
            <span>Starred</span>
        </a>
        <a href="/share/"
           class="flex items-center gap-2 px-2 py-1.5 rounded-md text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-surface-700 hover:text-gray-900 dark:hover:text-gray-100 transition-colors">
            <svg class="h-4 w-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
            </svg>
            <span>Shares</span>
        </a>
        <a href="/trash/"
           class="flex items-center gap-2 px-2 py-1.5 rounded-md text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-surface-700 hover:text-gray-900 dark:hover:text-gray-100 transition-colors">
            <svg class="h-4 w-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
            <span>Trash</span>
        </a>
        <a href="/activities/"
           class="flex items-center gap-2 px-2 py-1.5 rounded-md text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-surface-700 hover:text-gray-900 dark:hover:text-gray-100 transition-colors">
            <svg class="h-4 w-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span>Activity</span>
        </a>
    </div>

    <!-- Version footer -->
    <div class="border-t border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-surface-900 px-3 py-2.5">
        <div class="flex items-center justify-between gap-2">
            <div class="flex items-center gap-2 min-w-0">
                <svg class="h-3.5 w-3.5 flex-shrink-0 text-brand-500" viewBox="0 0 32 32" fill="currentColor">
                    <rect x="0" y="0" width="32" height="32" rx="6" fill="currentColor"/>
                    <text x="16" y="23" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="18" fill="white">N</text>
                </svg>
                <span class="text-[11px] leading-none text-gray-400 dark:text-gray-500 select-none">Nanofile {{ urls.version }}</span>
            </div>
            <span id="resp-time" class="text-[11px] leading-none text-gray-400 dark:text-gray-500 select-none opacity-0 transition-opacity duration-300"></span>
        </div>
    </div>
</div>

<!-- New Library dialog (self-contained) -->
<div id="quick-create-overlay" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/30" role="dialog" aria-modal="true" aria-labelledby="quick-create-title" onclick="if(event.target===this)hideQuickCreate()">
    <div class="bg-white dark:bg-surface-800 rounded-xl shadow-xl p-6 w-full max-w-sm mx-4" onclick="event.stopPropagation()">
        <h3 id="quick-create-title" class="text-base font-semibold text-gray-900 dark:text-gray-100 mb-1">New Library</h3>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Enter a name for the new library.</p>
        <form id="quick-create-form" onsubmit="return submitQuickCreate(this)">
            <input id="quick-create-input" type="text" name="name" placeholder="Library name"
                   class="block w-full rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-surface-700 dark:text-gray-100 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm p-2.5"
                   autofocus>
            <div class="mt-4 flex justify-end gap-2">
                <button type="button" onclick="hideQuickCreate()"
                        class="rounded-lg bg-white dark:bg-surface-700 px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-surface-600 transition-colors">
                    Cancel
                </button>
                <button type="submit"
                        class="rounded-lg bg-brand-500 px-4 py-2 text-sm font-medium text-white hover:bg-brand-600 transition-colors">
                    Create
                </button>
            </div>
        </form>
    </div>
</div>
