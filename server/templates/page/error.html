<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ status_code }} | Nanofile</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="h-full bg-surface-50 dark:bg-surface-900">
<div class="flex min-h-full items-center justify-center px-4">
    <div class="text-center">
        <h1 class="text-6xl font-bold text-gray-300 dark:text-gray-600">{{ status_code }}</h1>
        <p class="mt-4 text-lg text-gray-500 dark:text-gray-400">{{ message }}</p>
        <a href="/libraries/" class="mt-6 inline-block rounded-lg bg-brand-500 px-4 py-2 text-sm font-semibold text-white hover:bg-brand-600 transition-colors ">
            Go to Libraries
        </a>
    </div>
</div>
</body>
</html>
