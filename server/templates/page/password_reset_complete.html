{% extends "auth_base.html" %}

{% block title %}Password Reset Complete | Nanofile{% endblock %}

{% block heading %}
<h1 class="text-center text-2xl font-bold text-gray-900 dark:text-gray-100">Password Reset</h1>
<p class="mt-1 mb-6 text-center text-sm text-gray-500 dark:text-gray-400">All done</p>
{% endblock %}

{% block content %}
<div class="rounded-xl border border-green-200 dark:border-green-900 bg-green-50 dark:bg-green-900/20 p-4">
    <div class="flex">
        <svg class="h-5 w-5 flex-shrink-0 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p class="ml-2 text-sm text-green-700 dark:text-green-300">
            Your password has been reset successfully.
            Sign in with your new password.
        </p>
    </div>
</div>

<div class="mt-6">
    <a href="/accounts/login/"
       class="flex w-full justify-center rounded-lg bg-brand-500 px-4 py-2.5 text-sm font-semibold text-white  transition hover:bg-brand-600">
        Sign In
    </a>
</div>
{% endblock %}
