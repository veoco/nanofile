<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nanofile{% endblock %}</title>
    <meta name="description" content="Nanofile - Seafile-compatible sync server">
    <link rel="icon" type="image/svg+xml" href="{{ urls.favicon }}">
    <link rel="stylesheet" href="{{ urls.css }}">
</head>
<body class="h-full bg-gradient-to-br from-brand-50 via-white to-purple-50 dark:from-surface-900 dark:via-surface-800 dark:to-surface-900">
<div class="flex min-h-full items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md">
        <!-- Card -->
        <div class="bg-white dark:bg-surface-800 px-8 py-10 shadow-xl ring-1 ring-black/5 dark:ring-white/10 rounded-lg">
            <!-- Logo -->
            <div class="flex justify-center mb-6">
                <div class="h-12 w-12 rounded-xl bg-brand-500 flex items-center justify-center shadow-sm">
                    <span class="text-xl font-bold text-white">N</span>
                </div>
            </div>

            <!-- Heading -->
            {% block heading %}{% endblock %}

            <!-- Error alert (optional — set `error` in page template) -->
            {% block error %}{% endblock %}

            <!-- Page-specific form / content -->
            {% block content %}{% endblock %}
        </div>

        <!-- Footer links below card -->
        {% block footer %}{% endblock %}
    </div>
</div>
</body>
</html>
