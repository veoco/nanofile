{% extends "base.html" %}

{% block title %}{{ file_name }} | Nanofile{% endblock %}

{% block content %}
<nav class="flex mb-4 text-sm text-gray-500 flex-wrap items-center">
    <a href="/libraries/" class="hover:text-brand-500 dark:hover:text-brand-400 flex-shrink-0">Libraries</a>
    <span class="mx-2 flex-shrink-0">/</span>
    <a href="/libraries/{{ repo_id }}/files/" class="hover:text-brand-500 dark:hover:text-brand-400 flex-shrink-0">{{ repo_name }}</a>
    {% if parent_path != "" %}
    <span class="mx-2 flex-shrink-0">/</span>
    <a href="/libraries/{{ repo_id }}/files/{{ parent_path|urlencode }}" class="hover:text-brand-500 dark:hover:text-brand-400 flex-shrink-0">..</a>
    {% endif %}
    <span class="mx-2 flex-shrink-0">/</span>
    <span class="text-gray-900 dark:text-gray-100 font-medium truncate max-w-[200px]">{{ file_name }}</span>
</nav>

<div class="rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-surface-800 overflow-hidden">
    <div class="border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-surface-700 px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 flex items-center justify-between">
        <span>{{ file_name }}</span>
        <div class="flex items-center gap-2">
            <span class="text-xs text-gray-500 dark:text-gray-400">{{ size_display }}</span>
            <a href="/libraries/{{ repo_id }}/files/{{ parent_path|urlencode }}" class="text-xs text-brand-500 hover:underline">&larr; Back to folder</a>
        </div>
    </div>
    <div class="p-4 flex justify-center bg-gray-100 dark:bg-surface-700">
        <img src="/repos/{{ repo_id }}/files/{{ current_path }}" alt="{{ file_name }}"
             class="max-w-full max-h-[80vh] object-contain rounded shadow-sm"
             onerror="this.parentElement.innerHTML='<div class=\'text-gray-500 dark:text-gray-400 text-sm py-8\'>Image failed to load. <a href=\'/libraries/{{ repo_id }}/files/{{ current_path|urlencode }}?dl=1\' class=\'text-brand-500 hover:underline\'>Download instead</a></div>'">
    </div>
</div>
{% endblock %}
