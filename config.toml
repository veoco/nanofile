[server]
# Environment variables:
#   NANOFILE_SERVER_ADDR
#   NANOFILE_SERVER_PORT
#   NANOFILE_SERVER_SITE_URL
#   NANOFILE_SERVER_MAX_UPLOAD_SIZE_MB
#   NANOFILE_SERVER_REQUEST_TIMEOUT_SECS
#   NANOFILE_CORS_ALLOWED_ORIGINS           (comma-separated)
#   NANOFILE_CORS_MAX_AGE_SECS
addr = "0.0.0.0"
port = 8082
# External URL used for download links and CORS defaults.
# Change to "https://your-domain.com" when behind a TLS proxy.
site_url = "http://127.0.0.1:8082"
max_upload_size_mb = 4096
request_timeout_secs = 600
cors_allowed_origins = []
cors_max_age_secs = 86400
#   NANOFILE_SERVER_SECRET_KEY               (generate with: openssl rand -hex 32)
# IMPORTANT: Generate a unique secret key for production:
#   openssl rand -hex 32
secret_key = ""
# ^ Set to empty string to auto-generate on startup.
#   This is the single master key. The notification private key and
#   CSRF signing key are derived from it automatically.
#   For production, set NANOFILE_SERVER_SECRET_KEY to persist across restarts.

[database]
# Environment variables:
#   NANOFILE_DATABASE_URL
url = "sqlite:data/nanofile.db?mode=rwc"

[storage]
# Environment variables:
#   NANOFILE_STORAGE_BLOCK_DIR
#   NANOFILE_STORAGE_TEMP_DIR
#   NANOFILE_STORAGE_MAX_STORAGE_BYTES
block_dir = "data/blocks"
temp_dir = "data/temp"
max_storage_bytes = 0

[auth]
# Environment variables:
#   NANOFILE_AUTH_PASSWORD_HASH_ITERATIONS
#   NANOFILE_AUTH_API_TOKEN_TTL_DAYS
#   NANOFILE_AUTH_SYNC_TOKEN_TTL_DAYS
#   NANOFILE_AUTH_MAX_LOGIN_ATTEMPTS
#   NANOFILE_AUTH_LOCKOUT_DURATION_SECS
#   NANOFILE_AUTH_ENABLE_INVITATIONS
#   NANOFILE_AUTH_ENABLE_PASSWORD_RESET
#   NANOFILE_AUTH_PASSWORD_MIN_LENGTH
#   NANOFILE_AUTH_REQUIRE_STRONG_PASSWORD
password_hash_iterations = 600000
api_token_ttl_days = 180
sync_token_ttl_days = 365
max_login_attempts = 5
lockout_duration_secs = 900
enable_invitations = true
enable_password_reset = true
password_min_length = 8
require_strong_password = false
# Max password reset requests per IP per hour (0 = unlimited)
password_reset_max_per_hour = 5
# Max registration attempts per IP per hour (0 = unlimited)
registration_max_per_hour = 5
# Max TOTP verification attempts per user per 5 minutes (0 = unlimited)
totp_max_attempts = 5

[admin_init]
# Environment variables:
#   NANOFILE_ADMIN_INIT_EMAIL
#   NANOFILE_ADMIN_INIT_PASSWORD
#   NANOFILE_ADMIN_INIT_PASSWORD_FILE   (read password from a file, safer)
# email = "admin@example.com"
# password = "secret123"

[logging]
# Environment variables:
#   NANOFILE_LOG_LEVEL
level = "info"

[gc]
# Environment variables:
#   NANOFILE_GC_ENABLED
#   NANOFILE_GC_INTERVAL_HOURS
#   NANOFILE_GC_KEEP_COMMITS
enabled = false
interval_hours = 24
keep_commits = 100

[index]
# Environment variables:
#   NANOFILE_INDEX_ENABLED
#   NANOFILE_INDEX_INDEX_DIR
enabled = true
index_dir = "data/index"

[notification]
# Environment variables:
#   NANOFILE_NOTIFICATION_ENABLED
enabled = true
private_key = ""
# ^ When empty, derived from [server] secret_key automatically.
#   Set explicitly if you need a different key for notification JWTs
#   (e.g., when notification events are posted by external services).
ping_interval = 30
client_timeout = 90
